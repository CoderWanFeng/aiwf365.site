      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#a5f3fc"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#g)"/>
  <!-- face A -->
  <g transform="translate(180 130)">
